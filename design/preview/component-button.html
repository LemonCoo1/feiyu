<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 12px; background: var(--color-surface); font-family: var(--font-family-base); color: var(--color-on-surface); }
.row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.label { width: 92px; min-width: 92px; font-size: var(--font-size-caption); font-weight: var(--font-weight-eyebrow); color: var(--color-on-surface-variant); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.divider { border: none; border-top: 1px solid var(--color-outline); margin: 12px 0 8px; }

/* @component-css-start */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; cursor: pointer; font-family: var(--font-family-base); font-weight: 500; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; flex-shrink: 0; transition: background .15s, border-color .15s; }
.btn-sm { height: var(--size-button-height-sm); min-width: var(--size-button-height-sm); padding: 0 var(--space-3); font-size: var(--font-size-body); border-radius: var(--radius-sm); }
.btn-md { height: var(--size-button-height-md); min-width: var(--size-button-height-md); padding: 0 var(--space-4); font-size: var(--font-size-body); border-radius: var(--radius-md); }
.btn-lg { height: var(--size-button-height-lg); min-width: var(--size-button-height-lg); padding: 0 var(--space-5); font-size: var(--font-size-body); border-radius: var(--radius-md); }
.btn-primary { background: var(--color-primary); color: #ffffff; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; }
.btn-secondary { background: transparent; color: var(--color-primary); border: 1px solid var(--color-outline); }
.btn-secondary:hover { background: var(--color-primary-container); }
.btn-secondary:disabled { opacity: .4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--color-on-surface); border-radius: var(--radius-sm); }
.btn-ghost:hover { background: var(--surface-dim); }
.btn-ghost:disabled { opacity: .4; cursor: not-allowed; }
/* @component-css-end */
</style>
</head>
<body>

<div class="row"><span class="label">主要</span>
<button class="btn btn-sm btn-primary">发送消息</button>
<button class="btn btn-md btn-primary">发送消息</button>
<button class="btn btn-lg btn-primary">发送消息</button></div>

<div class="row"><span class="label">次要</span>
<button class="btn btn-sm btn-secondary">创建群聊</button>
<button class="btn btn-md btn-secondary">创建群聊</button>
<button class="btn btn-lg btn-secondary">创建群聊</button></div>

<hr class="divider">

<div class="row"><span class="label">文字</span>
<button class="btn btn-sm btn-ghost">搜索</button>
<button class="btn btn-md btn-ghost">更多操作</button>
<button class="btn btn-lg btn-ghost">取消</button></div>

<div class="row"><span class="label">禁用</span>
<button class="btn btn-md btn-primary" disabled>确认</button>
<button class="btn btn-md btn-secondary" disabled>取消</button></div>

</body>
</html>
