<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input — feiyu Design System</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
<style>
/* Page scaffold — NOT extracted */
body { margin: 0; padding: var(--space-3); background: var(--color-surface); font-family: var(--font-body); color: var(--color-on-surface); }
.specimen { max-width: 720px; margin: 0 auto; }
.stage { display: flex; flex-direction: column; gap: var(--space-3); }
.story { display: flex; flex-direction: column; gap: var(--space-2); }
.row { display: flex; gap: var(--space-2); align-items: center; flex-wrap: wrap; }
.label { font: var(--type-caption); color: var(--color-on-surface-variant); min-width: 92px; flex-shrink: 0; }
.divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-2) 0; }

/* @component-css-start */
/* Component definitions — extracted to components.css by deterministic script */
.input-wrap { display: inline-flex; align-items: center; gap: var(--space-2); height: var(--size-input-height); padding: 0 var(--space-3); background: var(--color-background); border: 1px solid var(--color-border); border-radius: var(--radius-md); color: var(--color-foreground); font: var(--type-body); transition: border-color .15s, box-shadow .15s; flex-shrink: 0; min-width: 180px; overflow: hidden; }
.input-wrap input { flex: 1; border: none; outline: none; background: transparent; color: inherit; font: inherit; min-width: 0; }
.input-wrap input::placeholder { color: var(--color-on-surface-variant); }
.input-wrap:focus-within { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(20,86,240,.15); }
.input-wrap .ic { width: var(--size-icon-md); height: var(--size-icon-md); flex-shrink: 0; color: var(--color-on-surface-variant); pointer-events: none; display: inline-block; }
.input-wrap.disabled { background: var(--color-surface-container-high); color: var(--muted); cursor: not-allowed; }
.input-wrap.disabled input { cursor: not-allowed; }
.input-wrap.disabled .ic { color: var(--muted); }
/* @component-css-end */
</style>
</head>
<body>
<div class="specimen">
<div class="stage">
<div class="story" data-evidence-sample="Default">
<div class="row"><span class="label">DEFAULT</span><div class="input-wrap" data-evidence-sample="Default"><input placeholder="请输入消息..."></div></div>
<div class="row"><span class="label">DISABLED</span><div class="input-wrap disabled" data-evidence-sample="Disabled"><input placeholder="请输入..." disabled></div></div>
</div>
<hr class="divider">
<div class="story" data-evidence-sample="left-icon">
<div class="row"><span class="label">搜索框</span><div class="input-wrap"><i data-lucide="search" class="ic"></i><input placeholder="搜索消息、文档、联系人..."></div></div>
<div class="row"><span class="label">密码输入</span><div class="input-wrap" data-evidence-sample="right-icon"><input type="password" placeholder="请输入密码..."><i data-lucide="eye-off" class="ic"></i></div></div>
</div>
</div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
