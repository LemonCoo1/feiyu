<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:var(--space-3); background:var(--color-background); font-family:var(--font-body); color:var(--color-on-surface); }
.row { display:flex; gap:var(--space-2); align-items:flex-start; margin-bottom:var(--space-2); }
.label { width:92px; min-width:92px; font:var(--type-caption); color:var(--color-on-surface-variant); text-transform:uppercase; letter-spacing:.08em; padding-top:var(--space-1); }
.divider { border:none; border-top:1px solid var(--color-border); margin:var(--space-3) 0; }
/* @component-css-start */
.chat-row { display:flex; gap:var(--space-2); align-items:flex-start; max-width:300px; }
.chat-row.self { flex-direction:row-reverse; }
.avatar { width:32px; height:32px; min-width:32px; border-radius:var(--radius-full); flex-shrink:0; background:var(--color-primary-container); display:flex; align-items:center; justify-content:center; font-size:var(--font-size-caption); font-weight:600; color:var(--color-on-primary-container); }
.chat-bubble { padding:var(--space-2) var(--space-3); max-width:240px; min-width:0; border-radius:var(--radius-lg); }
.chat-bubble.self { background:var(--color-primary); color:#ffffff; }
.chat-bubble.other { background:var(--surface); color:var(--color-on-surface); }
.sender-name { font-size:var(--font-size-eyebrow); font-weight:var(--font-weight-eyebrow); color:var(--color-on-surface-variant); margin-bottom:2px; }
.msg-text { font:var(--type-body); word-break:break-word; overflow-wrap:break-word; }
.chat-content { max-width:240px; min-width:0; }
.chat-img { width:200px; height:140px; border-radius:var(--radius-lg); background:var(--color-surface-container); }
.msg-caption { font:var(--type-caption); color:var(--color-on-surface-variant); margin-top:var(--space-1); }
/* @component-css-end */
</style>
</head>
<body>
<div class="row">
  <span class="label">发送消息</span>
  <div class="chat-row self">
    <div class="chat-bubble self"><div class="msg-text">你好，明天下午3点的会议改到4点了</div></div>
  </div>
</div>
<div class="row">
  <span class="label">接收消息</span>
  <div class="chat-row other">
    <div class="avatar">李</div>
    <div class="chat-bubble other">
      <div class="sender-name">李薇</div>
      <div class="msg-text">收到，我会准时参加</div>
    </div>
  </div>
</div>
<hr class="divider">
<div class="row">
  <span class="label">图片消息</span>
  <div class="chat-row other">
    <div class="avatar">张</div>
    <div class="chat-content">
      <div class="sender-name">张明</div>
      <div class="chat-img"></div>
      <div class="msg-caption">项目文档已更新，请查看</div>
    </div>
  </div>
</div>
</body>
</html>
