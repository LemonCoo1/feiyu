<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card 组件预览</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 12px; background: var(--color-surface); font-family: var(--font-body); color: var(--color-on-surface); }
  .specimen { max-width: 680px; margin: 0 auto; }
  .stage { display: flex; flex-direction: column; gap: var(--space-3); }
  .story { display: flex; flex-direction: column; gap: var(--space-2); }
  .rail { display: flex; flex-direction: column; gap: var(--space-2); }
  .story-label { font: var(--type-caption); color: var(--color-on-surface-variant); }
  .row { display: flex; align-items: stretch; }
  .divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-4) 0; }
  /* @component-css-start */
  .card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--color-border); transition: filter .15s; }
  .card:hover { filter: brightness(0.97); }
  .card-content { padding: var(--space-5); width: 100%; }
  .card-title { font: var(--type-h4); color: var(--color-on-surface); margin: 0 0 var(--space-2) 0; }
  .card-desc { font: var(--type-body); color: var(--color-on-surface-variant); margin: 0 0 var(--space-4) 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .card-actions { display: flex; gap: var(--space-2); }
  .card-btn { display: inline-flex; align-items: center; gap: var(--space-1); font: var(--type-body); color: var(--color-primary); background: none; border: none; cursor: pointer; padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); white-space: nowrap; transition: background .15s; }
  .card-btn:hover { background: var(--surface-container-high); }
  .card-file { padding: var(--space-4); width: 100%; }
  .card-file-inner { display: flex; align-items: center; gap: var(--space-3); }
  .file-icon { flex-shrink: 0; width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--surface-container-high); display: flex; align-items: center; justify-content: center; color: var(--color-primary); }
  .file-icon i { width: 20px; height: 20px; display: inline-block; }
  .file-info { min-width: 0; flex: 1; overflow: hidden; }
  .file-name { font: var(--type-body); color: var(--color-on-surface); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-meta { font: var(--type-caption); color: var(--color-on-surface-variant); margin-top: 2px; }
  .download-btn { display: inline-flex; align-items: center; gap: var(--space-1); font: var(--type-caption); color: var(--color-primary); background: none; border: 1px solid var(--color-border); cursor: pointer; padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); white-space: nowrap; flex-shrink: 0; transition: background .15s; }
  .download-btn:hover { background: var(--surface-container-high); }
  /* @component-css-end */
</style>
<script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="specimen">
  <div class="stage">
    <div class="story" data-evidence-sample="Content Card">
      <span class="story-label">内容卡片</span>
      <div class="rail">
        <div class="row">
          <div class="card card-content">
            <div class="card-title">项目进度报告</div>
            <p class="card-desc">本周完成了核心模块的开发与测试，下周将进入集成测试阶段。</p>
            <div class="card-actions">
              <button class="card-btn"><i data-lucide="eye" style="width:14px;height:14px;display:inline-block"></i> 查看详情</button>
              <button class="card-btn"><i data-lucide="share-2" style="width:14px;height:14px;display:inline-block"></i> 分享</button>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="card card-content">
            <div class="card-title">Q3 产品路线图</div>
            <p class="card-desc">第三季度将重点推进数据分析模块与自动化工作流功能的上线。</p>
            <div class="card-actions">
              <button class="card-btn"><i data-lucide="eye" style="width:14px;height:14px;display:inline-block"></i> 查看详情</button>
              <button class="card-btn"><i data-lucide="edit" style="width:14px;height:14px;display:inline-block"></i> 编辑</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <hr class="divider">
    <div class="story" data-evidence-sample="File Card">
      <span class="story-label">文件卡片</span>
      <div class="rail">
        <div class="row">
          <div class="card card-file">
            <div class="card-file-inner">
              <div class="file-icon"><i data-lucide="file-text"></i></div>
              <div class="file-info">
                <div class="file-name">会议纪要_0715.pdf</div>
                <div class="file-meta">PDF · 2.4 MB</div>
              </div>
              <button class="download-btn"><i data-lucide="download" style="width:14px;height:14px;display:inline-block"></i> 下载</button>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="card card-file">
            <div class="card-file-inner">
              <div class="file-icon"><i data-lucide="file"></i></div>
              <div class="file-info">
                <div class="file-name">设计稿_v2.fig</div>
                <div class="file-meta">Figma · 18.7 MB</div>
              </div>
              <button class="download-btn"><i data-lucide="download" style="width:14px;height:14px;display:inline-block"></i> 下载</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
