<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#87CEEB">
        <animate attributeName="stop-color" values="#87CEEB;#FFD700;#87CEEB" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#87CEEB;#FFD700" dur="2s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="55" fill="url(#bg)" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  <text x="60" y="72" font-size="55" text-anchor="middle" dominant-baseline="middle">
    👋
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1.5s" repeatCount="indefinite" additive="sum" />
  </text>
</svg>